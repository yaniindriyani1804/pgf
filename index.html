<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Guru - Yani Indriyani</title>
    <style>
        /* Mengatur latar belakang dan font dasar dengan tema pastel */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #FFEBF3; /* Latar pastel pink muda */
            color: #444;
        }

        /* Container utama untuk membagi 2 kolom (Kamera & Identitas) */
        .container {
            display: flex;
            flex-direction: row;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 90%;
            max-width: 1100px;
            border: 3px solid #FFB6C1; /* Bingkai luar pink pastel */
        }

        /* --- Kolom Kiri: Kamera --- */
        .camera-section {
            flex: 1.5; /* Mengambil ruang sedikit lebih besar dari kolom kanan */
            background-color: #000;
            position: relative;
            display: flex;
            min-height: 400px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Efek cermin agar gerakan tangan terasa natural */
        }

        /* --- Kolom Kanan: Identitas --- */
        .identity-section {
            flex: 1;
            background-color: #EBF8FF; /* Latar kolom identitas biru pastel muda */
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 4px solid #87CEEB; /* Garis pemisah biru pastel */
        }

        .name {
            font-size: 36px;
            font-weight: 800;
            color: #FF6B81; /* Pink tua / semangka agar nama menonjol */
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .role {
            font-size: 22px;
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
        }

        .school {
            font-size: 18px;
            color: #777;
            margin-bottom: 40px;
            font-style: italic;
        }

        /* Status koneksi kamera */
        .status {
            padding: 12px 15px;
            background-color: #ffffff;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            border: 1px solid #bce2f5;
            font-weight: 500;
        }

        /* --- Responsif: Berubah menjadi atas-bawah di layar kecil (HP/Tablet) --- */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                margin: 20px 0;
            }
            .camera-section {
                min-height: 300px;
            }
            .identity-section {
                border-left: none;
                border-top: 4px solid #87CEEB;
                text-align: center;
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Bagian Kiri: Kamera Live -->
        <div class="camera-section">
            <video id="webcam" autoplay playsinline muted></video>
        </div>

        <!-- Bagian Kanan: Identitas Guru -->
        <div class="identity-section">
            <div class="name">Yani Indriyani</div>
            <div class="role">Guru Fisika</div>
            <div class="school">SMPK 1 Bina Bakti Bandung</div>
            
            <div class="status" id="statusText">⏳ Meminta akses kamera...</div>
        </div>
    </div>

    <script>
        // Fungsi untuk menyalakan kamera
        async function startCamera() {
            const videoElement = document.getElementById('webcam');
            const statusText = document.getElementById('statusText');

            try {
                // Meminta akses resolusi HD (720p)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                
                // Memasukkan aliran video ke elemen HTML
                videoElement.srcObject = stream;
                statusText.innerHTML = "✅ Kamera berhasil terhubung.";
                statusText.style.color = "#4CAF50";
            } catch (error) {
                console.error('Error accessing camera:', error);
                statusText.innerHTML = "❌ Gagal mengakses kamera. Pastikan izin telah diberikan.";
                statusText.style.color = "#f44336";
            }
        }

        // Jalankan script saat halaman web selesai dimuat
        window.addEventListener('DOMContentLoaded', startCamera);
    </script>

</body>
</html>
