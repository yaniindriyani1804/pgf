<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera Live dengan Deteksi Jenis Kelamin</title>
    <!-- Memuat pustaka face-api.js dari CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Arial', sans-serif;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        #container {
            position: relative;
            display: flex;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        video, canvas {
            border-radius: 8px;
        }

        /* Menumpuk kanvas di atas video */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #status {
            margin-top: 15px;
            font-size: 1.1em;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>Deteksi Wajah & Jenis Kelamin Real-Time</h1>
    
    <div id="container">
        <!-- Elemen Video untuk Aliran Kamera -->
        <video id="video" width="720" height="560" autoplay muted playsinline></video>
        <!-- Elemen Kanvas untuk Menggambar Hasil -->
        <canvas id="canvas"></canvas>
    </div>

    <div id="status">Memuat model... Harap tunggu.</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');

        // Memuat model dari folder 'models' lokal
        async function loadModels() {
            const MODEL_URL = '/models'; // Sesuaikan jika folder model Anda berbeda
            statusDiv.innerText = 'Memuat model: Deteksi Wajah...';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            statusDiv.innerText = 'Memuat model: Landmark Wajah...';
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            statusDiv.innerText = 'Memuat model: Prediksi Jenis Kelamin...';
            await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
            statusDiv.innerText = 'Model dimuat. Meminta akses kamera...';
            startVideo();
        }

        // Meminta akses ke webcam
        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => {
                    video.srcObject = stream;
                    statusDiv.innerText = 'Kamera aktif. Melakukan deteksi...';
                })
                .catch(err => {
                    console.error("Gagal mengakses kamera:", err);
                    statusDiv.innerHTML = '<span style="color:red">Gagal mengakses kamera. Pastikan Anda memberikan izin.</span>';
                });
        }

        // Melakukan deteksi dan menggambar hasil setiap kali video diputar
        video.addEventListener('play', () => {
            const displaySize = { width: video.width, height: video.height };
            // Menyesuaikan ukuran kanvas dengan ukuran video
            faceapi.matchDimensions(canvas, displaySize);

            // Loop deteksi real-time
            const detectionLoop = async () => {
                // Mendeteksi semua wajah, landmark, dan jenis kelamin
                const detections = await faceapi.detectAllFaces(video, new faceapi.SsdMobilenetv1Options())
                    .withFaceLandmarks()
                    .withAgeAndGender();

                // Menyesuaikan hasil deteksi dengan ukuran tampilan
                const resizedDetections = faceapi.resizeResults(detections, displaySize);

                // Membersihkan kanvas sebelum menggambar bingkai baru
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                // Menggambar hasil ke kanvas
                resizedDetections.forEach(detection => {
                    const box = detection.detection.box;
                    const gender = detection.gender;
                    const genderProbability = detection.genderProbability;
                    const age = Math.round(detection.age); // Juga mendapatkan prediksi usia

                    // Menentukan teks label
                    const label = `${gender} (${Math.round(genderProbability * 100)}%)`;
                    // Atau gunakan yang ini untuk menyertakan usia:
                    // const label = `${gender}, ~${age} tahun (${Math.round(genderProbability * 100)}%)`;

                    // Menggambar kotak pembatas wajah
                    new faceapi.draw.DrawBox(box, { label: label }).draw(canvas);

                    // Menggambar landmark wajah (opsional)
                    // faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);
                });

                // Meminta bingkai berikutnya
                requestAnimationFrame(detectionLoop);
            };

            detectionLoop();
        });

        // Memulai proses
        loadModels();

    </script>
</body>
</html>
